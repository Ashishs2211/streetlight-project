<!DOCTYPE html>
<html>
<head>
<title>Login</title>
<style>
body{
font-family:Arial;
background:linear-gradient(135deg,#0f172a,#1e293b);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
color:white;
}
.box{
background:#111827;
padding:35px;
border-radius:18px;
width:350px;
}
input{
width:100%;
padding:12px;
margin-top:12px;
border:none;
border-radius:8px;
}
button{
width:100%;
padding:12px;
margin-top:15px;
background:#22c55e;
color:white;
border:none;
border-radius:8px;
}
a{
color:#22c55e;
text-decoration:none;
}
</style>
</head>
<body>

<div class="box">
<h1>Login</h1>

<form method="POST">
<input type="email" name="email" placeholder="Email" required>
<input type="password" name="password" placeholder="Password" required>
<button>Login</button>
</form>

<p>New user? <a href="/register">Register</a></p>
</div>

</body>
</html>
